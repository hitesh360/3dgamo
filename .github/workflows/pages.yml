name: Deploy to GitHub Pages

# Runs on every push to main (after PR merge) and on the game branch
on:
  push:
    branches:
      - main
      - copilot/create-3d-open-world-town
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No build step needed – the game is pure static HTML/JS
      # Three.js is loaded from CDN via an importmap in index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (contains index.html and src/)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
